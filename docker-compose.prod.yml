version: '3.8'

services:
  # The Core Golang Trading Engine
  engine:
    build: 
      context: ./engine
      dockerfile: Dockerfile
    container_name: antigravity_engine
    restart: always
    env_file:
      - .env
    depends_on:
      - timescaledb
      - redis

  # Infrastructure Databases
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: antigravity_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=antigravity
      - POSTGRES_PASSWORD=password123
      - POSTGRES_DB=antigravity
    volumes:
      - ./infrastructure/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: antigravity_cache
    restart: always

  # Telemetry (Metrics & UI)
  prometheus:
    image: prom/prometheus:latest
    container_name: antigravity_prometheus
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: antigravity_grafana
    ports:
      - "80:3000" # Expose grafana dashboard publicly on port 80
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    restart: always

volumes:
  pgdata:
